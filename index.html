<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP MotionPath Slider</title>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: white;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .motion-slider-wrapper {
      position: relative;
      width: 100%;
      max-width: 1416px;
      height: 120px;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }



    .motion-slide-item {
      position: absolute;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.12);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(26, 26, 26, 1);
      font-size: 12px;
      border: 1px solid rgba(136, 50, 55, 0.16);
      white-space: nowrap;
      text-transform: uppercase;
      font-family: Ppneuemontreal, Arial, sans-serif;
      font-weight: 700;
      /* letter-spacing: 0.77px; */
    }

    @media (max-width: 768px) {
      .motion-slide-item {
        font-size: 11px;
        padding: 4px 10px;
      }
    }

    @media (max-width: 480px) {
      .motion-slide-item {
        font-size: 10px;
        padding: 3px 8px;
      }
    }

    .midside-item {
      background: rgba(136, 50, 55, 0.24);

    }

    .mid-item {
      border: 1px solid rgba(26, 26, 26, 1);
      background: rgba(136, 50, 55, 1);
      color: rgba(249, 247, 245, 1);
    }

    #motionPath {
      opacity: 0;
      fill: none
    }
  </style>
</head>

<body>

  <div class="motion-slider-wrapper">

    <!-- SVG PATH -->
    <svg id="slideSvg" viewBox="0 0 1400 80">
      <!-- <path id="motionPath" d="
          M0 25
          L534 25
          C600 25, 650 80, 709 80
          C768 80, 818 25, 884 25
          L1418 25
        " /> -->
      <path id="motionPath" d="M0 0.5H474.577
     C535.022 0.5 588.959 37.2782 643.526 63.2801
     C666.695 74.3204 692.626 80.5 720 80.5
     C747.374 80.5 773.305 74.3204 796.474 63.2802
     C851.041 37.2782 904.977 0.5 965.423 0.5
     H1440" stroke="black" />
    </svg>

    <!-- SLIDE ITEMS -->
    <div class="motion-slide-item">Sculptra</div>
    <div class="motion-slide-item">Neurotoxin</div>
    <div class="motion-slide-item">Exosomes</div>
    <div class="motion-slide-item midside-item">XERF ✦ New</div>
    <div class="motion-slide-item mid-item">Radiesse HD</div>
    <div class="motion-slide-item midside-item">Secretomes</div>
    <div class="motion-slide-item">Hair PRP</div>
    <div class="motion-slide-item">PDRN</div>
    <div class="motion-slide-item">Microneedling</div>

  </div>

  <script>
    gsap.registerPlugin(MotionPathPlugin);

    const items = document.querySelectorAll(".motion-slide-item");
    const path = document.querySelector("#motionPath");

    let animations = [];

    // responsive
    function getConfig() {
      const width = window.innerWidth;

      if (width < 480) {
        return { spacing: 1 / items.length, duration: 8, scale: 0.4, itemWidth: "100px" };
      }

      if (width < 768) {
        return { spacing: 1 / items.length, duration: 10, scale: 0.6, itemWidth: "100px" };
      }

      if (width < 1024) {
        return { spacing: 1 / items.length, duration: 12, scale: 0.70, itemWidth: "110px" };
      }

      if (width < 1440) {
        return { spacing: 1 / items.length, duration: 12, scale: 0.85, itemWidth: "125px" };
      }

      return { spacing: 1 / items.length, duration: 15, scale: 1, itemWidth: "136px" };
    }

    // init
    function initSlider() {

      animations.forEach(anim => anim.kill());
      animations = [];

      const { spacing, duration, scale, itemWidth } = getConfig();

      items.forEach((item, i) => {

        gsap.set(item, {
          x: 0,
          y: 0,
          scale: scale,
          width: itemWidth,
          transformOrigin: "center center"
        });

        const tween = gsap.to(item, {
          duration: duration,
          repeat: -1,
          ease: "none",
          motionPath: {
            path: path,
            align: path,
            alignOrigin: [0.5, 0.5],
            start: i * spacing,
            end: i * spacing + 1,
            autoRotate: true
          }
        });

        animations.push(tween);
      });
    }

    initSlider();

    // resize handler
    let resizeTimeout;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);

      resizeTimeout = setTimeout(() => {
        initSlider();
      }, 200);
    });
  </script>

</body>

</html>
