<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP MotionPath Slider</title>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: white;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 200px;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }



    .slide-item {
      position: absolute;
      /* width: 100px; */
      height: 36px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.12);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(26, 26, 26, 1);
      font-size: 14px;
      border: 1px solid rgba(136, 50, 55, 0.16);
    }

    .midside-item {
      background: rgba(136, 50, 55, 0.24);

    }

    .mid-item {
      border: 1px solid rgba(26, 26, 26, 1);
      background: rgba(136, 50, 55, 1);
      color: rgba(249, 247, 245, 1);
    }

    #motionPath {
      opacity: 0;
      fill: none
    }
  </style>
</head>

<body>

  <div class="slider-wrapper">

    <!-- SVG PATH -->
    <svg id="slideSvg" viewBox="0 0 1400 80">
      <!-- <path id="motionPath" d="
          M0 25
          L534 25
          C600 25, 650 80, 709 80
          C768 80, 818 25, 884 25
          L1418 25
        " /> -->
      <path id="motionPath" d="M0 0.5H474.577
     C535.022 0.5 588.959 37.2782 643.526 63.2801
     C666.695 74.3204 692.626 80.5 720 80.5
     C747.374 80.5 773.305 74.3204 796.474 63.2802
     C851.041 37.2782 904.977 0.5 965.423 0.5
     H1440" stroke="black" />
    </svg>

    <!-- SLIDE ITEMS -->
    <div class="slide-item">Sculptra</div>
    <div class="slide-item">Neurotoxin</div>
    <div class="slide-item">Exosomes</div>
    <div class="slide-item midside-item">XERF ✦ New</div>
    <div class="slide-item mid-item">Radiesse HD</div>
    <div class="slide-item midside-item">Secretomes</div>
    <div class="slide-item">Hair PRP</div>
    <div class="slide-item">PDRN</div>
    <div class="slide-item">Microneedling</div>

  </div>

  <script>
    gsap.registerPlugin(MotionPathPlugin);

    const items = document.querySelectorAll(".slide-item");
    const path = document.querySelector("#motionPath");

    const total = items.length;
    const spacing = 1 / total;
    console.log(spacing);

    items.forEach((item, i) => {

      // infinite loop animation
      gsap.to(item, {
        duration: 15,
        repeat: -1,
        ease: "none",
        motionPath: {
          path: path,
          align: path,
          alignOrigin: [0.5, 0.5],
          start: i * spacing,
          end: i * spacing + 1,
          autoRotate: true
        }
      });

    });
  </script>

</body>

</html>
